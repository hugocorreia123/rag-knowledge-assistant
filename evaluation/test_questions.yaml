# Evaluation test set for the RAG Knowledge Assistant — EU AI Act.
#
# Each entry contains:
#   - id:                 stable identifier (so results are comparable across runs)
#   - category:           the broad type of question
#   - question:           what the user asks
#   - expected_pages:     list of EU AI Act PDF page numbers where the answer lives
#                         (used for retrieval precision/recall metrics)
#   - key_facts:          list of facts the answer should mention (used by LLM-judge)
#   - should_answer:      true  = a grounded answer is expected
#                         false = the system should refuse (out-of-scope)
#
# Categories: definition, obligation, prohibition, penalty, scope, governance,
#             transparency, gpai, out_of_scope
#
# Page numbers are 1-indexed and match data/raw/eu_ai_act.pdf as published by EUR-Lex.

# ---------- DEFINITIONS ----------
- id: def_ai_system
  category: definition
  question: How does the EU AI Act define an AI system?
  expected_pages: [4, 5, 44] 
  key_facts:
    - "machine-based system"
    - "infer from inputs"
    - "varying degrees of autonomy"
  should_answer: true

- id: def_gpai
  category: definition
  question: What is the definition of a general-purpose AI model?
  expected_pages: [26, 27, 76, 77]
  key_facts:
    - "general-purpose"
    - "significant generality"
    - "trained with large amounts of data"
  should_answer: true

- id: def_high_risk
  category: definition
  question: What qualifies an AI system as high-risk under the Act?
  expected_pages: [13, 14, 15, 17, 54, 55]
  key_facts:
    - "Annex III"
    - "safety component"
    - "intended purpose"
  should_answer: true

# ---------- PROHIBITIONS ----------
