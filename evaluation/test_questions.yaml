    - "law enforcement"
    - "publicly accessible spaces"
  should_answer: true

- id: prohib_social_scoring
  category: prohibition
  question: Does the EU AI Act prohibit social scoring by public authorities?
  expected_pages: [3, 46, 47, 50, 51]
  key_facts:
    - "social scoring"
    - "social behaviour"
    - "detrimental treatment"
  should_answer: true

